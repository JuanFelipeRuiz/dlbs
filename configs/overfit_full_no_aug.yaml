# Filesystem Output
project: runs/segment
name: yolo-seg-overfit-full-no-aug
exist_ok: false

# Logging
wandb: true
wandb_entity: dlbs-jf
wandb_project: runs-segment

# Core
model: yolo11n-seg.pt
data: /mnt/nas05/data01/slg-q1/dlbs/yolo_dataset/data.yaml   # voller Datensatz (wie Baseline)
epochs: 600
imgsz: 640
batch: 16
device: cuda
patience: 600        # = epochs -> kein Early-Stopping, soll den ganzen Train-Satz auswendig lernen
seed: 42
deterministic: true

# Konstante LR (kein Decay/Warmup) - konsistent mit Baseline / Stufen 2-4
warmup_epochs: 0
warmup_momentum: 0.0
warmup_bias_lr: 0.0
lr0: 0.00005
lrf: 1.0
optimizer: AdamW



# Keine Regularisierung -> vollen Overfit zulassen
weight_decay: 0.0
label_smoothing: 0.0

# Output artefacts
save: true
plots: true

# Turn off augmentation
degrees: 0.0
translate: 0.0
scale: 0.0
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.0

hsv_h: 0.0
hsv_s: 0.0
hsv_v: 0.0

mosaic: 0.0
mixup: 0.0
copy_paste: 0.0
erasing: 0.0
auto_augment: null
close_mosaic: 0
